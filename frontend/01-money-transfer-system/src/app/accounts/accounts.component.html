<div class="accounts-section">

  <div class="accounts-header">
    <h2 class="heading-font">All Accounts</h2>
  </div>

  <div *ngIf="accounts.length === 0" class="no-data">
    No accounts found
  </div>

  <div *ngIf="accounts.length > 0" class="table-wrapper">
    <table class="accounts-table">

      <thead>
        <tr>
          <th>Account ID</th>
          <th>Holder Name</th>
          <th>Balance</th>
          <th>Status</th>
          <th>Last Updated</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let account of accounts">
          <td class="id-cell">{{ account.accountId + 600100100 }}</td>
          <td>{{ account.holderName }}</td>
          <td class="balance">
            {{ account.balance | currency }}
          </td>
          <td>
            <span
              class="status-badge"
              [ngClass]="'status-' + account.accountStatus.toLowerCase()">
              {{ account.accountStatus }}
            </span>
          </td>
          <td>{{ account.lastUpdated | date:'short' }}</td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
