<div class="login-container">
  <div class="auth-back">
    <a routerLink="/home">
      ← Back to Home
    </a>
  </div>


  <div class="login-card">

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
      
      <div class="login-header">
        <h2 class="heading-font">Welcome Back</h2>
        <p class="muted">Sign in to continue to MTS</p>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button class="btn-navy full-width" [disabled]="loginForm.invalid">
        Login
      </button>

      <div class="bottom-link">
        <a routerLink="/register">
          New here? Create an account
        </a>
      </div>

    </form>

  </div>

</div>
